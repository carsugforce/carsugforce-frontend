<div class="lines-header">
  <div class="left">
    <div class="search">
      <mat-icon>search</mat-icon>
      <input
        matInput
        placeholder="Buscar familia..."
        [(ngModel)]="search" />
    </div>
  </div>

  <div class="right">
    <button
      mat-stroked-button
      [class.active]="filter === 'active'"
      (click)="filter = 'active'">
      Activas
    </button>

    <button
      mat-stroked-button
      [class.active]="filter === 'inactive'"
      (click)="filter = 'inactive'">
      Inactivas
    </button>

    <button
      mat-raised-button
      color="primary"
      class="create-btn"
      (click)="createFamily()">
      <mat-icon>add</mat-icon>
      Crear familia
    </button>
  </div>
</div>

<div class="lines-content">
  <div class="lines-grid" *ngIf="loading; else content">
    <div class="line-card skeleton" *ngFor="let i of skeletonArray"></div>
  </div>

  <ng-template #content>
    <div class="lines-grid">
      <app-family-card
        *ngFor="let family of filteredFamilies"
        [family]="family"
        (edit)="editFamily(family)"
        (remove)="deleteFamily(family)"
        (toggle)="toggleFamily(family)" 
        (viewLines)="goToLines($event)">
        
      </app-family-card>
    </div>
  </ng-template>

  <div class="empty" *ngIf="!loading && filteredFamilies.length === 0">
    No hay familias para mostrar
  </div>
</div>
