<div class="line-card" [class.inactive]="!family.isActive" >
  
  <div  (click)="onViewLines()">
    <div class="card-header">
        <div class="family-description">
          {{ family.description }}
        </div>

        <div class="status">
          <span class="dot" [class.active]="family.isActive" [class.inactive]="!family.isActive"></span>
          {{ family.isActive ? 'Activa' : 'Inactiva' }}
        </div>
      </div>

      <div class="card-body">
        <button class="status-badge" type="button"  >
          {{ family.linesCount }} líneas
        </button>
      </div>
  </div>

  <div class="card-footer">
    <button class="btn-edit" type="button" (click)="onEdit()">
      <mat-icon>edit</mat-icon>
      Editar
    </button>

    <button class="btn-delete" type="button" (click)="onRemove()">
      <mat-icon>delete</mat-icon>
      Eliminar
    </button>
  </div>
</div>
